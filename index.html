<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>App Download</title>

  <script>
    function redirect() {
      var ua = navigator.userAgent;

      // iOS（iPhone / iPad）
      if (/iPhone|iPad|iPod/i.test(ua)) {
        window.location.href = "https://apps.apple.com/us/app/alphamed-health/id6758136792";
      }

      // Android
      else if (/Android/i.test(ua)) {
        window.location.href = "https://play.google.com/store/search?q=alphamed+health&c=apps";
      }

      // PC / 其他设备 → APK
      else {
        window.location.href = "https://www.pgyer.com/alphamedhealth-android-5";
      }
    }

    window.onload = redirect;
  </script>
</head>

<body style="font-family: Arial; text-align:center; padding-top:80px;">
  <h3>正在为您跳转下载页面，请稍候...</h3>
</body>
</html>
